<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Smart Digital Locker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-form">
        <div class="auth-header">
          <span class="logo-icon">🔒</span>
          <h1>Register</h1>
          <p>Create your secure locker account</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="John Doe"
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="your@email.com"
            />
          </div>

          <div class="form-group password-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="••••••••"
              minlength="6"
            />
            <button
              type="button"
              class="password-toggle"
              onclick="togglePassword('password')"
            >
              👁️
            </button>
          </div>

          <div class="form-group password-group">
            <label for="passwordConfirm">Confirm Password</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              required
              placeholder="••••••••"
            />
            <button
              type="button"
              class="password-toggle"
              onclick="togglePassword('passwordConfirm')"
            >
              👁️
            </button>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Create Account
          </button>
        </form>

        <div class="auth-message" id="message"></div>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Login here</a></p>
          <a href="/">Back to Home</a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const passwordConfirm =
            document.getElementById("passwordConfirm").value;
          const messageEl = document.getElementById("message");

          if (password !== passwordConfirm) {
            messageEl.textContent = "Passwords do not match";
            messageEl.className = "auth-message error";
            return;
          }

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ name, email, password, passwordConfirm }),
            });

            const data = await response.json();

            if (data.success) {
              localStorage.setItem("token", data.token);
              messageEl.textContent = "Registration successful! Redirecting...";
              messageEl.className = "auth-message success";
              setTimeout(() => {
                window.location.href = "/dashboard";
              }, 1500);
            } else {
              messageEl.textContent = data.message || "Registration failed";
              messageEl.className = "auth-message error";
            }
          } catch (error) {
            console.error("Registration error:", error);
            messageEl.textContent = "An error occurred. Please try again.";
            messageEl.className = "auth-message error";
          }
        });
    </script>
  </body>
</html>
